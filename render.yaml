# Render Blueprint: FastAPI backend + Flutter web (static).
# https://render.com/docs/blueprint-spec
#
# Web UI: snakebite-web → https://snakebite-web.onrender.com (or your custom domain)
# API:    snakebite-api → https://snakebite-api.onrender.com
#
# Model weights (*.pt) are gitignored; upload to the API instance or use an artifact pipeline so models/ exists at runtime.
# If you rename snakebite-api, update API_BASE on snakebite-web to match its public URL.

services:
  - type: web
    name: snakebite-api
    runtime: python
    # `free` needs no card; `starter` requires payment info on the workspace (see Render pricing).
    # If PyTorch + API OOMs on free (512 MB), switch to plan: starter after adding a card.
    plan: free
    region: oregon
    buildCommand: pip install --no-cache-dir -r requirements-render.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Optional: HTTPS URL to wound_ensemble.pt (GitHub Release asset, S3, etc.) so production matches local lab.
      # Set in the Render dashboard: WOUND_ENSEMBLE_URL=https://.../wound_ensemble.pt

  - type: web
    name: snakebite-web
    runtime: static
    buildCommand: bash scripts/render_build_web.sh
    staticPublishPath: ./mobile/snakebite_rx/build/web
    # Client-side routes (/home, etc.): serve index.html when no static file matches.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Public URL of snakebite-api (default hostname for service name snakebite-api). Override if you rename the API or use a custom domain.
      - key: API_BASE
        value: https://snakebite-api.onrender.com
