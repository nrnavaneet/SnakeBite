name: snakebite_rx
description: SnakeBiteRx multimodal decision support (demo client).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  image_picker: ^1.0.7
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  go_router: ^14.6.2
  flutter_animate: ^4.5.2
  provider: ^6.1.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
